name: 🚀 Django Package CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Trigger PyPI publish on version tags like 'v0.1.0'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["5.2", "6.0"]
        exclude:
          # Django 6.0 requires Python >= 3.12
          - python-version: "3.10"
            django-version: "6.0"
          - python-version: "3.11"
            django-version: "6.0"

    env:
      PY_VERSION: ${{ matrix.python-version }}
      DJANGO_VERSION: ${{ matrix.django-version }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ⚡ Install uv (fast package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 🐍 Setup Python & Create Virtualenv
        run: |
          uv python install "$PY_VERSION"
          uv venv --python "$PY_VERSION"

      - name: 📦 Install Dependencies
        run: |
          uv pip install "Django~=${DJANGO_VERSION}.0"
          uv pip install -e ".[dev]"

      - name: 🧹 Run Linter (flake8)
        run: uv run flake8 src tests

      - name: ✅ Run Tests (pytest)
        run: uv run pytest --cov=trusted_devices --cov-report=term-missing

  publish:
    name: 📦 Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ⚡ Install uv (fast package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 🐍 Setup Python & Create Virtualenv
        run: |
          uv python install ${{ env.PYTHON_VERSION }}
          uv venv

      - name: 📦 Install Build Tools
        run: uv pip install build twine

      - name: 🚀 Build & Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          uv run python -m build
          uv run twine upload dist/*
